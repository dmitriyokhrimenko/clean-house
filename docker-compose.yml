version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: clean_house_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cleanhouse}
      POSTGRES_USER: ${POSTGRES_USER:-cleanhouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cleanhouse_secret}
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cleanhouse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clean_house_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cleanhouse}:${POSTGRES_PASSWORD:-cleanhouse_secret}@postgres:5432/${POSTGRES_DB:-cleanhouse}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: clean_house_frontend
    ports:
      - "3005:80"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: clean_house_cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - backend